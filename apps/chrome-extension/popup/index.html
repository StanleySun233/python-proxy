<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Proxy</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow" data-lang="popupEyebrow">Remote proxy control</p>
          <h1>One Proxy</h1>
        </div>
        <div class="hero-tools">
          <div class="theme-switch" id="themeMode">
            <button type="button" data-theme-mode="vivid" data-lang="themeVivid">Vivid</button>
            <button type="button" data-theme-mode="dark" data-lang="themeDark">Dark</button>
          </div>
          <button id="syncButton" class="ghost" type="button" data-lang="syncNow">Sync</button>
          <button id="openOptions" class="ghost" type="button" data-lang="settings">Settings</button>
        </div>
      </section>
      <section class="status-card">
        <div>
          <p class="label" data-lang="account">Account</p>
          <h2 id="accountName">-</h2>
        </div>
        <div class="pill" id="syncMeta">-</div>
      </section>
      <section class="status-strip" id="statusMessage"></section>
      <section class="toggle-grid">
        <button id="masterToggle" class="toggle-card" type="button">
          <span class="toggle-label" data-lang="proxySwitch">Proxy</span>
          <span class="toggle-value" id="masterValue" data-lang="off">Off</span>
        </button>
      </section>
      <section>
        <div class="section-head">
          <p class="section-title" data-lang="activeGroup">Active group</p>
          <span class="mono" id="currentSite" data-lang="noSite">No site</span>
        </div>
        <select id="groupSelect" class="select"></select>
      </section>
      <section class="detail-grid">
        <article class="detail-card">
          <p class="section-title" data-lang="entryNode">Entry node</p>
          <p class="detail-value" id="entryNodeName">-</p>
          <p class="detail-meta" id="entryNodeAddress">-</p>
        </article>
        <article class="detail-card">
          <p class="section-title" data-lang="policyRevision">Policy</p>
          <p class="detail-value mono" id="policyRevision">-</p>
          <p class="detail-meta" id="ruleCounts">-</p>
        </article>
      </section>
      <section class="quick-actions">
        <button id="addDirect" class="secondary" type="button" data-lang="thisSiteDirect">This site direct</button>
        <button id="addProxy" class="secondary" type="button" data-lang="thisSiteProxy">This site proxy</button>
      </section>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
