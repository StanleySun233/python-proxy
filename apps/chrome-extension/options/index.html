<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang="optionsTitle">One Proxy Settings</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="headline">
        <div>
          <p class="eyebrow">One Proxy</p>
          <h1 data-lang="optionsHeading">Remote groups and browser routing</h1>
        </div>
        <div class="headline-side">
          <div class="theme-strip" id="themeMode">
            <button type="button" data-theme-mode="vivid" data-lang="themeVivid">Vivid</button>
            <button type="button" data-theme-mode="dark" data-lang="themeDark">Dark</button>
          </div>
        </div>
      </section>
      <section class="layout">
        <article class="panel panel-auth">
          <div class="panel-head">
            <h2 data-lang="connection">Connection</h2>
            <div class="action-row">
              <button id="syncRemote" class="ghost" type="button" data-lang="syncNow">Sync</button>
              <button id="logoutButton" class="danger" type="button" data-lang="logout">Logout</button>
            </div>
          </div>
          <div class="form-grid">
            <label class="wide">
              <span data-lang="controlPlaneUrl">Control plane URL</span>
              <input id="controlPlaneUrl" type="url" placeholder="https://pp.example.com" />
            </label>
            <label>
              <span data-lang="account">Account</span>
              <input id="account" type="text" />
            </label>
            <label>
              <span data-lang="password">Password</span>
              <input id="password" type="password" />
            </label>
          </div>
          <div class="action-row top-gap">
            <button id="testConnectionButton" class="ghost" type="button" data-lang="testConnection">Test Connection</button>
            <button id="loginButton" class="primary" type="button" data-lang="login">Login</button>
          </div>
          <div id="sessionMeta" class="meta-card"></div>
          <div id="feedback" class="feedback"></div>
        </article>
        <article class="panel panel-groups">
          <div class="panel-head">
            <h2 data-lang="groups">Groups</h2>
            <span id="policyMeta" class="pill">-</span>
          </div>
          <div id="groupList" class="list"></div>
        </article>
        <article class="panel panel-detail">
          <div class="panel-head">
            <h2 id="groupTitle" data-lang="groupDetail">Group detail</h2>
          </div>
          <div class="detail-stack">
            <div class="meta-card">
              <div class="meta-label" data-lang="entryNode">Entry node</div>
              <div id="entryMeta" class="meta-value">-</div>
            </div>
            <div class="meta-card">
              <div class="meta-label" data-lang="remoteRules">Remote rules</div>
              <div id="remoteRuleSummary" class="meta-value">-</div>
            </div>
            <div class="form-grid">
              <label class="wide">
                <span data-lang="localDirectHosts">Local direct hosts</span>
                <textarea id="directHosts"></textarea>
              </label>
              <label class="wide">
                <span data-lang="localProxyHosts">Local proxy hosts</span>
                <textarea id="proxyHosts"></textarea>
              </label>
            </div>
            <div class="action-row">
              <button id="saveOverrides" class="primary" type="button" data-lang="saveOverrides">Save overrides</button>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
