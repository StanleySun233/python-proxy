root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/one-proxy-node"
cmd = "go build -o ./tmp/one-proxy-node ./cmd/one-proxy-node"
delay = 500
exclude_dir = ["tmp", "runtime", "docs"]
exclude_file = []
exclude_regex = ["_test\\.go"]
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = true
stop_on_error = true

[color]
app = "blue"
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = true

[misc]
clean_on_exit = true
