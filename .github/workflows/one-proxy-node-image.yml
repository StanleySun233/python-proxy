name: one-proxy-node-image

on:
  push:
    branches: [main]
    paths:
      - 'apps/one-proxy-node/**'
      - 'docker/one-proxy-node.Dockerfile'
      - '.github/workflows/one-proxy-node-image.yml'
  pull_request:
    paths:
      - 'apps/one-proxy-node/**'
      - 'docker/one-proxy-node.Dockerfile'
      - '.github/workflows/one-proxy-node-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build proxy-node image
        run: docker build -f docker/one-proxy-node.Dockerfile -t one-proxy-node:ci .

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build proxy-node image
        run: docker build -f docker/one-proxy-node.Dockerfile -t ghcr.io/${{ env.OWNER_LC }}/one-proxy-node:latest .

      - name: Push proxy-node image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/one-proxy-node:latest
