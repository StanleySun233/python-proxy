name: docker-images

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build control-plane image
        run: docker build -f docker/control-plane.Dockerfile -t one-proxy-control-plane:ci .

      - name: Build proxy-node image
        run: docker build -f docker/proxy-node.Dockerfile -t one-proxy-proxy-node:ci .

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build control-plane image
        run: docker build -f docker/control-plane.Dockerfile -t ghcr.io/${{ env.OWNER_LC }}/one-proxy-control-plane:latest .

      - name: Build proxy-node image
        run: docker build -f docker/proxy-node.Dockerfile -t ghcr.io/${{ env.OWNER_LC }}/one-proxy-proxy-node:latest .

      - name: Push control-plane image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/one-proxy-control-plane:latest

      - name: Push proxy-node image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/one-proxy-proxy-node:latest
