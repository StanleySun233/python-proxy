name: control-plane-image

on:
  push:
    branches: [main]
    paths:
      - 'apps/control-plane-api/**'
      - 'apps/control-plane-web/**'
      - 'docker/control-plane.Dockerfile'
      - 'docker/control-plane-start.sh'
      - '.github/workflows/control-plane-image.yml'
  pull_request:
    paths:
      - 'apps/control-plane-api/**'
      - 'apps/control-plane-web/**'
      - 'docker/control-plane.Dockerfile'
      - 'docker/control-plane-start.sh'
      - '.github/workflows/control-plane-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build control-plane image
        run: docker build -f docker/control-plane.Dockerfile -t one-proxy-panel:ci .

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build control-plane image
        run: docker build -f docker/control-plane.Dockerfile -t ghcr.io/${{ env.OWNER_LC }}/one-proxy-panel:latest .

      - name: Push control-plane image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/one-proxy-panel:latest
